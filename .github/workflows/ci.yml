name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        pandas-version: ["pandas>=2.0,<3.0", "pandas>=3.0,<4.0"]
        exclude:
          # pandas 3 requires Python 3.10+
          - python-version: "3.10"
            pandas-version: "pandas>=3.0,<4.0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "${{ matrix.pandas-version }}"
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=scrubdf --cov-report=term-missing

      - name: Check import works
        run: python -c "from scrubdf import cleaning_pipeline, read_file; print('Import OK')"
